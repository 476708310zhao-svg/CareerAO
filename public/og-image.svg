<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#003A99"/>
      <stop offset="100%" stop-color="#0A6EFF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="220" fill="white" fill-opacity="0.04"/>
  <circle cx="1100" cy="550" r="160" fill="white" fill-opacity="0.05"/>
  <circle cx="80" cy="560" r="120" fill="white" fill-opacity="0.04"/>

  <!-- Grid dots pattern (subtle) -->
  <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="white" fill-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Logo icon (adapted from favicon) -->
  <rect x="72" y="80" width="72" height="72" rx="18" fill="white" fill-opacity="0.15"/>
  <path d="M108 100 L136 114 L136 126" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M80 114 L108 100 L136 114 L108 128 Z" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M88 118 v10 c8 8 24 8 32 0 v-10" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Brand name -->
  <text x="164" y="126" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="4">职引</text>

  <!-- Tagline -->
  <text x="72" y="220" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="36" font-weight="400" fill="white" fill-opacity="0.9">留学生一站式求职平台</text>

  <!-- Divider -->
  <rect x="72" y="260" width="80" height="4" rx="2" fill="white" fill-opacity="0.5"/>

  <!-- Feature cards row -->
  <g>
    <!-- Card 1 -->
    <rect x="72" y="300" width="220" height="90" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <text x="92" y="340" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="white">📅</text>
    <text x="132" y="338" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="22" font-weight="600" fill="white">校招日历</text>
    <text x="132" y="368" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="16" fill="white" fill-opacity="0.7">8000+ 条动态</text>

    <!-- Card 2 -->
    <rect x="312" y="300" width="220" height="90" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <text x="332" y="340" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="white">🤖</text>
    <text x="372" y="338" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="22" font-weight="600" fill="white">AI 面试</text>
    <text x="372" y="368" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="16" fill="white" fill-opacity="0.7">模拟真实场景</text>

    <!-- Card 3 -->
    <rect x="552" y="300" width="220" height="90" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <text x="572" y="340" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="white">💰</text>
    <text x="612" y="338" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="22" font-weight="600" fill="white">薪资查询</text>
    <text x="612" y="368" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="16" fill="white" fill-opacity="0.7">真实大厂数据</text>

    <!-- Card 4 -->
    <rect x="792" y="300" width="220" height="90" rx="12" fill="url(#card)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <text x="812" y="340" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="white">📝</text>
    <text x="852" y="338" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="22" font-weight="600" fill="white">笔经面经</text>
    <text x="852" y="368" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="16" fill="white" fill-opacity="0.7">求职经验分享</text>
  </g>

  <!-- Bottom URL -->
  <text x="72" y="560" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="white" fill-opacity="0.55">www.zhiyincareer.com</text>

  <!-- Bottom tagline -->
  <text x="72" y="595" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif" font-size="20" fill="white" fill-opacity="0.4">助力留学生高效应对求职全流程</text>
</svg>
