# ⚠️  CRITICAL: DO NOT DELETE OR MODIFY THIS FILE
# This workflow auto-deploys to the production VPS (49.233.163.175) on every push to main.
# Deleting this file will break the CI/CD pipeline and require manual re-setup.
# If you need to change deployment config, discuss with the repo owner first.

name: Build & Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://www.zhiyincareer.com
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Pre-render pages for SEO
        run: |
          CHROME=$(which google-chrome-stable google-chrome chromium-browser chromium 2>/dev/null | head -1)
          if [ -n "$CHROME" ]; then
            echo "Pre-rendering with Chrome: $CHROME"
            PUPPETEER_EXECUTABLE_PATH="$CHROME" npm run prerender \
              || echo "Pre-render failed, deploying without pre-rendering"
          else
            echo "Chrome not found, skipping pre-render"
          fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via tar pipe
        run: |
          tar czf - -C dist . | ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "rm -rf /www/wwwroot/zhiyincareer-web/* && tar xzf - -C /www/wwwroot/zhiyincareer-web/"
